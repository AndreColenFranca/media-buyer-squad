name: Sync Media Buyer Squad

  on:
    schedule:
      - cron: '0 * * * *'  # A cada 1 hora
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    sync:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
            token: ${{ secrets.SYNC_TOKEN_SQUAD }}

        - name: Configurar Git
          run: |
            git config user.name "GitHub Actions Bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"

        - name: Verificar se há mudanças
          run: |
            git remote add upstream https://github.com/allanrehder/media-buyer-squad.git
            git fetch upstream main

            if git diff --quiet origin/main upstream/main; then
              echo "✓ Sem mudanças. Sincronização cancelada."
              exit 0
            else
              echo "⚠️ Mudanças detectadas! Sincronizando..."
            fi

        - name: Sincronizar com upstream (merge)
          run: |
            git remote add upstream https://github.com/allanrehder/media-buyer-squad.git
            git fetch upstream main
            git merge -X theirs upstream/main -m "Sincronização automática com allanrehder/media-buyer-squad" || true
            git push https://x-access-token:${{ secrets.SYNC_TOKEN_SQUAD }}@github.com/${{ github.repository }}.git main

        - name: ✓ Sincronização concluída!
          run: |
            echo "Sincronização executada com sucesso!"
            git log -1 --oneline
