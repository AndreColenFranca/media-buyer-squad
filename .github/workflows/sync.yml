name: Sync Media Buyer Squad

on:
  schedule:
    - cron: '50 16 * * *'  # 14:50 Brasília (16:50 UTC - horário de verão)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN_SQUAD }}

      - name: Configurar Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar com upstream (merge)
        run: |
          git remote add upstream https://github.com/allanrehder/media-buyer-squad.git
          git fetch upstream main
          git merge -X theirs upstream/main -m "Sincronização automática com allanrehder/media-buyer-squad" || true
          git push origin main

      - name: ✓ Sincronização concluída!
        run: |
          echo "Sincronização executada com sucesso!"
          git log -1 --oneline
