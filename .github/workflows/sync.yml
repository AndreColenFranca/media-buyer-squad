name: Sync Media Buyer Squad

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN_SQUAD }}

      - name: Configurar Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verificar se há mudanças
        run: |
          git remote add upstream https://github.com/allanrehder/media-buyer-squad.git
          git fetch upstream main

          LOCAL=$(git rev-parse origin/main)
          REMOTE=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Sem mudancas. Sincronizacao cancelada."
            exit 0
          else
            echo "Mudancas detectadas! Sincronizando..."
          fi

      - name: Sincronizar com upstream (merge)
        run: |
          git fetch upstream main
          git merge -X theirs upstream/main -m "Sincronizacao automatica com allanrehder/media-buyer-squad" || true
          git push https://x-access-token:${{ secrets.SYNC_TOKEN_SQUAD }}@github.com/${{ github.repository }}.git main

      - name: Sincronizacao concluida!
        run: |
          echo "Sincronizacao executada com sucesso!"
          git log -1 --oneline
